version: "3"

vars:
  # ---------------------------------------------------------------------------
  # Marketplace configuration
  # ---------------------------------------------------------------------------
  PLUGIN_MARKETPLACE_URL: "git@github.com:JRAnthonyrajah/claude-setup.git"
  PLUGIN_MARKETPLACE_NAME: "james-core-marketplace"

  # ---------------------------------------------------------------------------
  # Plugin architecture (AUTHORITATIVE)
  # ---------------------------------------------------------------------------
  PLUGINS_CORE:
    - kernel
    - kernel-hooks
    - supervisor

  PLUGINS_OPTIONAL:
    - userland
    - drivers
    - ralph
    - thinker
    - turing-connector



tasks:
  # ---------------------------------------------------------------------------
  # Default
  # ---------------------------------------------------------------------------
  default:
    cmds:
      - |
        echo "Claude Setup Task Runner"
        echo ""
        echo "Common commands:"
        echo "  task install              - One-command setup"
        echo "  task health               - Check installation health"
        echo "  task validate             - Validate complete installation"
        echo "  task plugins:install-core - Install core plugins"
        echo "  task tmux                 - Launch Claude in tmux with agent teams"
        echo ""
        echo "Run 'task --list' for all available tasks"

  # ---------------------------------------------------------------------------
  # Installation
  # ---------------------------------------------------------------------------
  install:
    desc: "One-command setup: add marketplace, install core plugins, verify"
    deps: [plugins:add-marketplace]
    cmds:
      - |
        set -euo pipefail
        for plugin in {{range .PLUGINS_CORE}}{{.}} {{end}}; do
          echo "Installing core plugin: $plugin"
          claude plugin install "$plugin@{{.PLUGIN_MARKETPLACE_NAME}}" --scope local
        done
      - task: plugins:verify-core
      - |
        echo ""
        echo "Installation complete!"
        echo ""
        echo "Next steps:"
        echo "  1. Run task health"
        echo "  2. Read README.md"
        echo "  3. Try /prime-project"

  install:interactive:
    desc: "Interactive setup with prompts for optional plugins"
    deps: [plugins:add-marketplace]
    cmds:
      - |
        set -euo pipefail
        for plugin in {{range .PLUGINS_CORE}}{{.}} {{end}}; do
          echo "Installing core plugin: $plugin"
          claude plugin install "$plugin@{{.PLUGIN_MARKETPLACE_NAME}}" --scope local
        done
      - task: plugins:verify-core
      - echo "Claude Setup - Interactive Installation"
      - |
        read -p "Install optional plugins ({{range .PLUGINS_OPTIONAL}}{{.}} {{end}})? (Y/n): " -n 1 -r
        echo
        if [[ $REPLY =~ ^[Yy]$ ]] || [ -z "$REPLY" ]; then
          for plugin in {{range .PLUGINS_OPTIONAL}}{{.}} {{end}}; do
            echo "Installing optional plugin: $plugin"
            claude plugin install "$plugin@{{.PLUGIN_MARKETPLACE_NAME}}" --scope local
          done
        fi
      - echo ""
      - echo "Setup complete!"

  # ---------------------------------------------------------------------------
  # Plugin Management
  # ---------------------------------------------------------------------------
  plugins:add-marketplace:
    internal: true
    cmds:
      - |
        set -euo pipefail

        echo "Adding marketplace: {{.PLUGIN_MARKETPLACE_NAME}}"

        if claude plugin marketplace list 2>/dev/null | grep -q "{{.PLUGIN_MARKETPLACE_NAME}}"; then
          echo "  ✓ Marketplace already added"
        else
          claude plugin marketplace add "{{.PLUGIN_MARKETPLACE_URL}}"
          echo "  ✓ Marketplace added"
        fi

  # ---------------------------------------------------------------------------
  # Validation
  # ---------------------------------------------------------------------------
  validate:
    desc: "Validate complete installation (plugins, conventions, health)"
    cmds:
      - echo "🔍 Validating Claude Setup installation..."
      - echo ""
      - echo "Checking plugins..."
      - task: plugins:verify-core
      - echo ""
      - echo "Checking conventions..."
      - task: validate:conventions
      - echo ""
      - echo "✅ All validations passed!"

  validate:plugins:
    desc: "Verify all plugins load correctly"
    cmds:
      - |
        echo "📦 Checking plugin status..."
        echo ""

        if ! command -v claude &> /dev/null; then
          echo "❌ Error: Claude CLI not found"
          echo "   Install from: https://console.anthropic.com/claude-code"
          exit 1
        fi

        echo "Installed plugins:"
        claude plugin list

        echo ""
        echo "✓ Plugin check complete"

  validate:conventions:
    desc: "Run convention validation on plugins"
    cmds:
      - python3 validate_conventions.py

  health:
    desc: "Quick health check of installation"
    cmds:
      - |
        echo "=== Claude Setup Installation Health Check ==="
        echo ""
        echo "Prerequisites:"
        echo -n "  Claude CLI: "
        if command -v claude &> /dev/null; then
          echo "✓ Found"
        else
          echo "✗ Not found - see Installation Guide"
        fi

        echo -n "  Python 3: "
        if command -v python3 &> /dev/null; then
          v=$(python3 --version 2>&1 | cut -d' ' -f2)
          echo "✓ Found ($v)"
        else
          echo "✗ Not found"
        fi

        echo -n "  Git: "
        if command -v git &> /dev/null; then
          echo "✓ Found"
        else
          echo "✗ Not found"
        fi

        echo -n "  Task: "
        if command -v task &> /dev/null; then
          echo "✓ Found"
        else
          echo "✗ Not found"
        fi

        echo -n "  Tmux: "
        if command -v tmux &> /dev/null; then
          v=$(tmux -V 2>&1)
          echo "✓ Found ($v)"
        else
          echo "- Not installed (optional, brew install tmux)"
        fi

        echo -n "  Happy CLI: "
        if command -v happy &> /dev/null; then
          echo "✓ Found (remote sessions available)"
        else
          echo "- Not installed (optional, npm install -g happy-coder)"
        fi

        echo ""
        echo "Core plugins (should be installed):"
        for plugin in {{range .PLUGINS_CORE}}{{.}} {{end}}; do
          if claude plugin list 2>/dev/null | grep -q "$plugin"; then
            echo "  ✓ $plugin"
          else
            echo "  ✗ $plugin (missing - run: task install)"
          fi
        done

        echo ""
        echo "Dev/Prod mode:"
        if [ -f ".claude/dev-mode.json" ] && grep -q '"mode": *"dev"' .claude/dev-mode.json 2>/dev/null; then
          echo "  DEV mode active (local plugins)"
          echo "  Use 'task prod' to switch to marketplace plugins"
        else
          echo "  PROD mode (marketplace plugins)"
          echo "  Use 'task dev' to switch to local plugins"
        fi

        echo ""
        echo "=== Health check complete ==="

  # ---------------------------------------------------------------------------
  # Verify core plugins are installed
  # ---------------------------------------------------------------------------
  plugins:verify-core:
    desc: "Verify all core plugins are installed (usage: task plugins:verify-core)"
    cmds:
      - |
        set -e

        missing=""
        for plugin in {{range .PLUGINS_CORE}}{{.}} {{end}}; do
          if ! claude plugin list 2>/dev/null | grep -q "$plugin"; then
            missing="$missing $plugin"
          fi
        done

        if [ -z "$missing" ]; then
          echo "✅ All core plugins installed:"
          for plugin in {{range .PLUGINS_CORE}}{{.}} {{end}}; do
            echo "  ✓ $plugin"
          done
        else
          echo "❌ Missing core plugins:$missing"
          exit 1
        fi

  # ---------------------------------------------------------------------------
  # Reset plugin environment (DEV ONLY)
  # ---------------------------------------------------------------------------
  plugins:reset-environment:
    desc: "Remove marketplace and all plugins — requires CONFIRM=yes (DEV ONLY)"
    cmds:
      - |
        if [ "${CONFIRM:-}" != "yes" ]; then
          echo "This will remove ALL plugins and the marketplace."
          echo "Re-run with CONFIRM=yes to proceed."
          exit 1
        fi
        echo "Removing marketplace {{.PLUGIN_MARKETPLACE_NAME}}..."
        claude plugin marketplace remove "{{.PLUGIN_MARKETPLACE_NAME}}" || true
        echo "Removing ~/.claude/plugins..."
        rm -rf ~/.claude/plugins
        echo "Reset complete"

  # ---------------------------------------------------------------------------
  # Dev/Prod Mode Toggle
  # ---------------------------------------------------------------------------
  dev:
    desc: "Activate dev mode (use local plugins from plugins/)"
    cmds:
      - bash scripts/dev-toggle.sh on {{.CLI_ARGS}}

  prod:
    desc: "Activate prod mode (use marketplace plugins)"
    cmds:
      - bash scripts/dev-toggle.sh off

  dev:status:
    desc: "Show current dev/prod mode"
    cmds:
      - bash scripts/dev-toggle.sh status

  dev:launch:
    desc: "Launch Claude Code respecting dev/prod mode"
    cmds:
      - bash scripts/claude-dev.sh {{.CLI_ARGS}}

  dev:happy:
    desc: "Launch Claude Code via Happy (remote-capable, dev mode)"
    cmds:
      - bash scripts/claude-dev.sh --happy {{.CLI_ARGS}}

  # ---------------------------------------------------------------------------
  # Tmux / Agent Teams
  # ---------------------------------------------------------------------------
  tmux:
    desc: "Launch Claude Code in tmux with agent team support"
    cmds:
      - bash scripts/tmux-launch.sh {{.CLI_ARGS}}

  tmux:dev:
    desc: "Launch Claude Code in tmux with dev mode + agent teams"
    cmds:
      - bash scripts/tmux-launch.sh --dev {{.CLI_ARGS}}

  tmux:iterm:
    desc: "Launch Claude Code with iTerm2 tmux -CC integration"
    cmds:
      - bash scripts/tmux-launch.sh --iterm {{.CLI_ARGS}}

  tmux:list:
    desc: "List active Claude tmux sessions"
    cmds:
      - |
        sessions=$(tmux ls 2>/dev/null | grep "^claude-" || true)
        if [ -z "$sessions" ]; then
          echo "No active Claude tmux sessions"
        else
          echo "Active Claude tmux sessions:"
          echo "$sessions"
        fi

  tmux:kill:
    desc: "Kill all Claude tmux sessions"
    cmds:
      - |
        sessions=$(tmux ls 2>/dev/null | grep "^claude-" | cut -d: -f1 || true)
        if [ -z "$sessions" ]; then
          echo "No Claude tmux sessions found"
        else
          for s in $sessions; do
            echo "Killing session: $s"
            tmux kill-session -t "$s"
          done
          echo "All Claude sessions killed"
        fi

  # ---------------------------------------------------------------------------
  # Clean repo artifacts
  # ---------------------------------------------------------------------------
  clean:
    desc: "Clean development artifacts and temporary files"
    cmds:
      - echo "🧹 Cleaning up development artifacts..."
      - echo ""
      - |
        for dir in .agents .pytest_cache .venv output; do
          if [ -d "$dir" ]; then
            echo "  Removing $dir/"
            rm -rf "$dir"
          fi
        done
      - |
        echo "  Removing __pycache__ directories"
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - |
        if [ -d "SPEC" ]; then
          echo "  Removing SPEC/*"
          find SPEC -mindepth 1 -delete 2>/dev/null || rm -rf SPEC/*
        fi
      - echo ""
      - echo "✅ Cleanup complete"
