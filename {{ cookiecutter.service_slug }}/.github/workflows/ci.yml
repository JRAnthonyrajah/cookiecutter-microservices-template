name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: contains(fromJson('["python"]'), '{{ cookiecutter.language }}')
        uses: actions/setup-python@v4
        with:
          python-version: "{{ cookiecutter.python_version }}"

      - name: Set up Node.js
        if: contains(fromJson('["node", "javascript", "typescript"]'), '{{ cookiecutter.language }}')
        uses: actions/setup-node@v4
        with:
          node-version: "{{ cookiecutter.node_version }}"

      - name: Set up Go
        if: contains(fromJson('["go"]'), '{{ cookiecutter.language }}')
        uses: actions/setup-go@v4
        with:
          go-version: "{{ cookiecutter.go_version }}"

      - name: Lint Python code with ruff
        if: contains(fromJson('["python"]'), '{{ cookiecutter.language }}')
        run: |
          pip install ruff
          ruff check .

      - name: Format check Python code with black
        if: contains(fromJson('["python"]'), '{{ cookiecutter.language }}')
        run: |
          pip install black
          black --check .

      - name: Lint Node code with ESLint
        if: contains(fromJson('["node", "javascript", "typescript"]'), '{{ cookiecutter.language }}')
        run: |
          npm install
          npm run lint || echo "Lint completed"

      - name: Lint Go code with golangci-lint
        if: contains(fromJson('["go"]'), '{{ cookiecutter.language }}')
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: contains(fromJson('["python"]'), '{{ cookiecutter.language }}')
        uses: actions/setup-python@v4
        with:
          python-version: "{{ cookiecutter.python_version }}"

      - name: Set up Node.js
        if: contains(fromJson('["node", "javascript", "typescript"]'), '{{ cookiecutter.language }}')
        uses: actions/setup-node@v4
        with:
          node-version: "{{ cookiecutter.node_version }}"

      - name: Set up Go
        if: contains(fromJson('["go"]'), '{{ cookiecutter.language }}')
        uses: actions/setup-go@v4
        with:
          go-version: "{{ cookiecutter.go_version }}"

      - name: Run Python tests with pytest
        if: contains(fromJson('["python"]'), '{{ cookiecutter.language }}')
        run: |
          pip install pytest pytest-cov
          pytest --cov=. --cov-report=xml

      - name: Run Node tests with Jest
        if: contains(fromJson('["node", "javascript", "typescript"]'), '{{ cookiecutter.language }}')
        run: |
          npm install
          npm test -- --coverage || echo "Tests completed"

      - name: Run Go tests
        if: contains(fromJson('["go"]'), '{{ cookiecutter.language }}')
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: |
            {{ cookiecutter.service_slug }}:${{ github.sha }}
            {{ cookiecutter.service_slug }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: latest

      - name: Lint Helm chart
        run: |
          helm lint ./helm --strict

      - name: Template Helm chart
        run: |
          helm template {{ cookiecutter.service_slug }} ./helm

  push:
    name: Push to Registry
    runs-on: ubuntu-latest
    needs: [lint, test, build, helm-lint]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to registry
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_REGISTRY }}/{{ cookiecutter.service_slug }}:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY }}/{{ cookiecutter.service_slug }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
